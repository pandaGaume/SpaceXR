<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Exemple de dessin de tuiles sur canvas</title>
        <script src="../../../dev/core/bundles/spacexr.1.0.0.js"></script>
        <script src="../scripts/inputs.js"></script>
        <style>
            html,
            body {
                height: 100%;
                margin: 0;
            }
            #tileCanvas {
                width: 100%;
                height: 100%;
                display: block;
                touch-action: none;
            }
            #compass {
                position: absolute;
                top: 20px; /* Adjust this to position the compass */
                right: 20px; /* Adjust this to position the compass */
                width: 200px; /* Adjust this according to your compass image size */
                height: 200px; /* Adjust this according to your compass image size */
                transform-origin: center;
            }

            #compassImage {
                width: 100%;
                height: 100%;
            }
        </style>
    </head>
    <body>
        <div id="mapContainer">
            <canvas id="tileCanvas"></canvas>
            <div id="compass">
              <img id="compassImage" src="../images/compass.png" alt="Compass">
            </div>
        <script>
            window.onload = () => {
                // Récupérer le canvas
                const canvas = document.getElementById("tileCanvas");

                // initialiser la localisation et le niveau de zoom
                // cela peut être un tableau de coordonnées [lat, lon] ou un objet { lat: lat, lon: lon }
                let center = [27.98817689833976, 86.92491071824738]; // everest
                const lod = 12;

                // definir la source de donnée.
                const tileClient = SPACEXR.Google.SatelliteClient2d() ;
                 
                // construire la carte.
                // display may be a canvas or a display object if we want to set scale or other options.
                const map = new SPACEXR.CanvasMap("myMap", canvas).setView([27.98817689833976, 86.92491071824738], lod);
                const layer = new SPACEXR.TileMapLayer("myLayer", tileClient, { attribution:SPACEXR.Google.Attribution } ).addTo(map);
                
                function onDrag(m, dx, dy, b) {
                    switch (b) {
                        case 0: {
                            // translate the center of the map according the drag displacement
                            // then we have to negate the drag displacement
                            map.translatePixel(-dx, -dy);
                            break;
                        }
                        case 2: {
                            map.rotate(dx);
                            updateCompassRotation(map.navigation.azimuth.value);
                            break;
                        }
                    }
                }

                function onWheel(m, dz) {
                    map.zooming(dz);
                }
                
                function updateCompassRotation(azimuth) {
                    var compass = document.getElementById('compass');
                    compass.style.transform = 'rotate(' + azimuth + 'deg)';
                }

 
                    // Function to handle the compass click event
                function handleCompassClick(event) {
                    map.setView(undefined, undefined, 0);
                    updateCompassRotation(0);
                }

                // Get the compass element
                var compass = document.getElementById('compass');

                // Add a click event listener to the compass
                compass.addEventListener('click', handleCompassClick);

                const translateManager = new MouseDragInputs(canvas, { ondrag: onDrag });

                translateManager.attachControl(canvas);
                const zoomManager = new MouseWheelInputs(canvas, { onwheel: onWheel, inc: 0.1 });

                document.addEventListener('keydown', function(event) {
                    if (event.ctrlKey) {
                        console.log('DOWN')
                    }
                });
                
                document.addEventListener('keyup', function(event) {
                    if (event.key === 'Control' || event.key === 'Meta') {
                          console.log('UP')
                     }
                });
                
                // Function to recursively update the animation frame
                // This function is called every time the browser is ready to repaint the canvas
                // This is the main animation loop
                function updateFrame() {
                    // Update the animation frame
                    map.validate();
                    // Recursively request another frame update
                    requestAnimationFrame(updateFrame);
                }

                // Start the animation
                requestAnimationFrame(updateFrame);
            };
        </script>
    </body>
</html>
