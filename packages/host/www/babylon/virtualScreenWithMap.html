<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Exemple d'un ecrans virtuel</title>
        <script src="../libs/babylon.js"></script>
        <script src="../libs/babylon.gui.js"></script>
        <script src="../libs/babylonjs.loaders.js"></script>
        <script src="../libs/babylon.glTF2FileLoader.js"></script>
        <script src="../libs/babylon.inspector.bundle.js"></script>

        <script src="../../../dev/babylon/bundles/stellar_landscape_xr.1.0.0.js"></script>
        <style>
            html,
            body {
                overflow: hidden;
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
            }

            #mapcanvas3d {
                width: 100%;
                height: 100%;
            }
            #compass {
                position: absolute;
                top: 20px;
                right: 20px;
                width: 200px;
                height: 200px;
                transform-origin: center;
            }

            #compassImage {
                width: 100%;
                height: 100%;
            }
        </style>
    </head>
    <body>
        <div id="mapcontainer">
            <canvas id="mapcanvas3d"></canvas>
        </div>
        <script>
            const defaultCenter = [27.98817689833976, 86.92491071824738]; // everest
            const defaultLod = 12;

            function createTextureMap(scene) {
                const options = SPACEXR.MapTexture.OptionsHD();
                options.background = "blue";
                options.alpha = 0.8;
                options.invertY = true;
                const name = "MapTexture";
                var texture = new SPACEXR.MapTexture(name, options, scene).setViewMap(defaultCenter, defaultLod);
                const l = new SPACEXR.ImageLayer(`${name}.layer`, SPACEXR.Google.SatelliteClient2d(), { attribution: SPACEXR.Google.Attribution }).addTo(texture);
                return texture;
            }

            async function createScene(canvas, engine) {
                // This creates a basic Babylon Scene object (non-mesh)
                const scene = new BABYLON.Scene(engine);
                // Parameters: name, alpha, beta, radius, target position, scene
                const camera = new BABYLON.ArcRotateCamera("Camera", Math.PI / 4, Math.PI / 4, 200, new BABYLON.Vector3(0, 150, 0), scene);

                camera.setTarget(new BABYLON.Vector3(0, 50, 0));
                camera.wheelPrecision = 20;
                camera.minZ = 0;
                // This attaches the camera to the canvas
                camera.attachControl(canvas, true);

                // This creates a light, aiming 0,1,0 - to the sky (non-mesh)
                const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
                // Default intensity is 1. Let's dim the light a small amount
                light.intensity = 0.7;

                // create a basic table (in centimeter)
                const h = 170;
                const w = 270;
                const t = 100;

                // create an hologram display reference with a 96 dpi
                const display = new SPACEXR.VirtualDisplay(
                    "display",
                    { height: h, width: w, thickness: t },
                    { width: 3200, height: 1800, thickness: 720 }, // in 'pixel', ratio of 16/9
                    scene
                );
                display.position.y = 90;
                display.rotation.x = -Math.PI / 2;
                display.rotation.z = -Math.PI / 2;

                const material = new BABYLON.StandardMaterial("mapMaterial", scene);
                const texture = createTextureMap(scene);
                material.diffuseTexture = texture;
                display.material = material;

                // this is the controller which take the input pointers from the display and forward the navigation events to map texture
                const source = display.pointerSource;
                const target = new SPACEXR.InputsNavigationTarget(texture);
                const controller = new SPACEXR.PointerController(source, target);

                display.freezeWorldMatrix();

                camera.setTarget(display);

                return scene;
            }

            window.onload = async () => {
                const canvas = document.getElementById("mapcanvas3d"); // Get the canvas element
                const engine = new BABYLON.Engine(canvas, true); // Generate the BABYLON 3D engine
                const scene = await createScene(canvas, engine); //Call the createScene function
                // scene.debugLayer.show();
                // Register a render loop to repeatedly render the scene
                engine.runRenderLoop(function () {
                    scene.render();
                });

                // Watch for browser/canvas resize events
                window.addEventListener("resize", function () {
                    engine.resize();
                });
            };
        </script>
    </body>
</html>
