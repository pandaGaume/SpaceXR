        function degreesToRadians(degrees) {
            return degrees * Math.PI / 180;
        }

        function convertGeoToPixel(point, rect, canvas) {
            const lonDelta = rect.ne.lon - rect.sw.lon;
            const x = (point.lon - rect.sw.lon) * (canvas.width / lonDelta);

            const pointLatRad = degreesToRadians(point.lat);
            const worldMapWidth = ((canvas.width / lonDelta) * 360) / (2 * Math.PI);
            const bottomLatRad = degreesToRadians(rect.sw.lat);
            const mapOffsetY = (worldMapWidth / 2 * Math.log((1 + Math.sin(bottomLatRad)) / (1 - Math.sin(bottomLatRad))));

            const y = canvas.height - ((worldMapWidth / 2 * Math.log((1 + Math.sin(pointLatRad)) / (1 - Math.sin(pointLatRad)))) - mapOffsetY);
            return { x, y };
        }

        function loadGeoJSON(path) {
            return fetch(path)
                .then(rsp => rsp.json());
        }

        function downloadTiles(tiles) {
            const container = document.getElementById('download-links');
            for (const tile of tiles) {
                var image = tile.canvas.toDataURL("image/png");
                const a = document.createElement('a');
                a.download = tile.name + '.png';
                a.href = image;
                a.text = tile.name;
                // a.style.display = 'none';
                container?.appendChild(a);
            }
        }

        window.onload = async () => {

            const _tiles = [];
            const pathCoordinates = [];
            try {
                const geoJSON = await loadGeoJSON('assets/etape-du-tour-track.geojson');
                if (geoJSON.type === 'Feature') {
                    if (geoJSON.geometry?.type === 'GeometryCollection') {
                        for (const geometry of geoJSON.geometry.geometries) {
                            if (geometry.type === 'LineString') {
                                for (const coords of geometry.coordinates) {
                                    pathCoordinates.push(new SPACEXR.Geo2(coords[1], coords[0]));
                                }
                            }
                        }
                    }
                }
            } catch (error) {
                alert(`Unable to load GeoJSON file. Reason: ${error}`);
            }

            const pathEnvelope = SPACEXR.Envelope.FromPoints(...pathCoordinates);

            const tileSize = 30;
            const maxZoom = 12;
            // const maxIndex = Math.pow(2, zoom) - 1;
            // First determine the tiles on which the feature is visible at the given zoom level
            const nwTileXY = SPACEXR.EPSG3857.Shared.getLatLonToTileXY(pathEnvelope.nw.lat, pathEnvelope.nw.lon, maxZoom);
            let xMin = nwTileXY.x;
            let yMin = nwTileXY.y;
            const seTileXY = SPACEXR.EPSG3857.Shared.getLatLonToTileXY(pathEnvelope.se.lat, pathEnvelope.se.lon, maxZoom);
            let xMax = seTileXY.x;
            let yMax = seTileXY.y;

            // Use a quad tree to determine which parts of the path are visible on each tile
            // The quad tree has a fixed depth and an infinite number of items on leaves.
            // It must be made sure that the number of leaves is a multiple of 2.
            let columnCount = xMax - xMin + 1;
            let rowCount = yMax - yMin + 1;
            if (columnCount % 2 !== 0) columnCount += 1;
            if (rowCount % 2 !== 0) rowCount += 1;

            const leavesCount = Math.pow(Math.max(columnCount, rowCount), 2);
            const quadTreeDepth = Math.log2(leavesCount);

            const upperLeftTileLatLon = SPACEXR.EPSG3857.Shared.getTileXYToLatLon(xMin, yMin, maxZoom);
            const bottomRightTileLatLon = SPACEXR.EPSG3857.Shared.getTileXYToLatLon(xMax, yMax, maxZoom);
            const fullBounds = SPACEXR.Envelope.FromPoints(bottomRightTileLatLon, upperLeftTileLatLon);
            // Setting the maxCount to 0 forces the items to be inserted in the leaves.
            const quadTree = new SPACEXR.SpatialIndex(fullBounds, {
                maxDepth: quadTreeDepth,
                maxCount: 0
            });

            // build path segments
            const bits = [];
            if (pathCoordinates.length > 0) {
                for (let i = 1; i < pathCoordinates.length; i++) {
                    const bit = {
                        index: i - 1,
                        from: pathCoordinates[i - 1],
                        to: pathCoordinates[i]
                    };
                    bit.bounds = SPACEXR.Envelope.FromPoints(bit.from, bit.to);
                    bits.push(bit);
                    quadTree.add(bit);
                }
            }

            SPACEXR.SpatialIndex.IterateNodes(quadTree.root, (node, depth, x, y) => {
                // console.log(`Depth=${depth}, x=${x}, y=${y}`);
                if (depth === quadTreeDepth) {
                    const tileXY = {
                        x: xMin + x,
                        y: yMin + y
                    };
                    // const tileRect = {
                    //     ne: SPACEXR.EPSG3857.Shared.getTileXYToLatLon(tileXY.x + 1, tileXY.y, maxZoom),
                    //     sw: SPACEXR.EPSG3857.Shared.getTileXYToLatLon(tileXY.x, tileXY.y + 1, maxZoom)
                    // };

                    const tileCanvas = document.createElement("canvas");
                    tileCanvas.width = tileSize;
                    tileCanvas.height = tileSize;
                    
                    const ctx = tileCanvas.getContext('2d');
                    ctx.fillStyle = "#000044";
                    ctx.fillRect(0, 0, tileCanvas.width, tileCanvas.height);

                                             // Draw the path on the canvas.
                    ctx.strokeStyle = 'cyan';
                    ctx.beginPath();
                    for (const item of node.contents()) {
                        const coordinates = [
                            item.from,
                            item.to
                        ];
                        const screenCoordinates = coordinates.map((point) => {
                            return convertGeoToPixel(point, node._env, tileCanvas);
                        });

                        for (let i = 0; i < screenCoordinates.length - 1; i++) {
                            ctx.moveTo(screenCoordinates[i].x, screenCoordinates[i].y);
                            ctx.lineTo(screenCoordinates[i + 1].x, screenCoordinates[i + 1].y);
                        }
                        ctx.stroke();
                    }
                    ctx.closePath();
                    tileCanvas.style.position = 'absolute';
                    tileCanvas.style.left = `${x * tileSize}px`;
                    tileCanvas.style.top = `${y * tileSize}px`;
                    tileCanvas.style.border = `1px solid #222`;
                    const container = document.getElementById('tiles-container');
                    container.appendChild(tileCanvas);
                }
            });


            // Draw the feature on each tile
            // for (let x = xMin; x <= xMax; x++) {
            //     for (let y = yMin; y <= yMax; y++) {

            //         const tileRect = {
            //             northEast: SPACEXR.EPSG3857.Shared.getTileXYToLatLon(x + 1, y, maxZoom),
            //             southWest: SPACEXR.EPSG3857.Shared.getTileXYToLatLon(x, y + 1, maxZoom)
            //         };
            //         // console.log('tile rect: ', tileRect);
            //         const bounds = new SPACEXR.Envelope(tileRect.northEast, tileRect.southWest);
            //         const node = new SPACEXR.SpatialIndexNode(bounds);

            //         const tileCanvas = document.createElement("canvas");

            //         tileCanvas.height = tileSize; 
            //         const ctx = tileCanvas.getContext('2d');

            //         // TODO Clip polyline to visible area

            //         const screenCoordinates = pathCoordinates.map((point) => {
            //             return convertGeoToPixel(point, tileRect, tileCanvas);

            //         // Draw the path on the canvas.

            //         for (let i = 0; i < screenCoordinates.length - 1; i++) {
            //             ctx.moveTo(screenCoordinates[i].x, screenCoordinates[i].y);
            //             ctx.lineTo(screenCoordinates[i + 1].x, screenCoordinates[i + 1].y);

            //         container.appendChild(tileCanvas);

            //         _tiles.push({

            //             canvas: tileCanvas

            // }
            // downloadTiles(_tiles);

            // for (let zoom = 1; zoom <= maxZoom; zoom++) {

            //     // for each feature, convert its bounding box coordinates to tile
