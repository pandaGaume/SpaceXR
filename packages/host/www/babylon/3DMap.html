<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Exemple d'un ecrans virtuel</title>
        <script src="../libs/babylon.js"></script>
        <script src="../libs/babylon.inspector.bundle.js"></script>

        <script src="../../../dev/babylon/bundles/stellar_landscape_xr.1.0.0.js"></script>
        <style>
            html,
            body {
                overflow: hidden;
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
            }

            #mapcanvas3d {
                width: 100%;
                height: 100%;
            }
            #compass {
                position: absolute;
                top: 20px;
                right: 20px;
                width: 200px;
                height: 200px;
                transform-origin: center;
            }

            #compassImage {
                width: 100%;
                height: 100%;
            }
        </style>
    </head>
    <body>
        <div id="mapcontainer">
            <canvas id="mapcanvas3d"></canvas>
        </div>
        <script>
            const defaultCenter = SPACEXR.KnownPlaces.Mountains.MontBlanc; // everest
            const defaultLod = 11;

            function createGlassMaterial(scene, reflectionTexture, refractionTexture) {
                // Create a PBR material
                const glass = new BABYLON.PBRMaterial("glass", scene);
                glass.reflectionTexture = reflectionTexture;
                glass.refractionTexture = refractionTexture;
                glass.linkRefractionWithTransparency = true;
                glass.indexOfRefraction = 0.52;
                glass.alpha = 0;
                glass.microSurface = 1;
                glass.reflectivityColor = new BABYLON.Color3(0.2, 0.2, 0.2);
                glass.albedoColor = new BABYLON.Color3(0.85, 0.85, 0.85);
                return glass;
            }

            async function createScene(canvas, engine) {
                // This creates a basic Babylon Scene object (non-mesh)
                const scene = new BABYLON.Scene(engine);
                // Parameters: name, alpha, beta, radius, target position, scene
                const camera = new BABYLON.ArcRotateCamera("Camera", Math.PI / 4, Math.PI / 4, 200, new BABYLON.Vector3(0, 150, 0), scene);

                camera.setTarget(new BABYLON.Vector3(0, 50, 0));
                camera.wheelPrecision = 10;
                camera.minZ = 0;
                // This attaches the camera to the canvas
                camera.attachControl(canvas, true);

                // This creates a light, aiming 0,1,0 - to the sky (non-mesh)
                const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
                // Default intensity is 1. Let's dim the light a small amount
                light.intensity = 0.5;
                light.diffuse = new BABYLON.Color3(1, 1, 1);

                const pointLight = new BABYLON.PointLight("pointLight", new BABYLON.Vector3(500, 150, 0), scene);
                pointLight.diffuse = new BABYLON.Color3(1, 1, 1);
                pointLight.intensity = 0.8;

                // create a basic table (in centimeter)
                const size = {
                    width: 320,
                    height: 240,
                };

                const resolution = SPACEXR.VirtualDisplay.SD;

                // set the virtual display
                const buildClipPlane = true;
                const display = new SPACEXR.HolographicDisplay("holographicDisplay", size, resolution, scene);
                display.material = createGlassMaterial(scene);
                display.rotation.x = -Math.PI / 2;
                display.freezeWorldMatrix();

                camera.setTarget(display);

                // build the map options
                const mapOptions = {
                    metrics: {
                        resolution: display.resolution,
                        dimension: display.dimension,
                        scale: 25000.0,
                    },
                };

                // build the map
                const map = new SPACEXR.Map3d("map", mapOptions, scene).setViewMap(defaultCenter, defaultLod).withDisplay(display);
                map.parent = display; // and attach to parent.

                const defaultTileMaterial = new BABYLON.StandardMaterial("groundMaterial", scene);
                defaultTileMaterial.wireframe = true;

                // build layer options
                const layerOptions = {
                    zindex: 0,
                    zoomOffset: 0,
                    attribution: SPACEXR.MapZen.Attribution,
                    exageration: 1.5,
                    gridOptions: undefined,
                    insets: new BABYLON.Vector3(0, 0, 10),
                    //material: defaultTileMaterial,
                };

                // build layer and add it to the map
                let client = SPACEXR.MapZen.DemClient();
                const l = new SPACEXR.ElevationLayer(`${client.name}`, client, layerOptions).addTo(map);

                client = SPACEXR.Google.TerrainClient2d();
                const t = new SPACEXR.ImageLayer(`${client.name}`, client); //.addTo(map);

                const showAxes = false;
                if (showAxes) {
                    const axes = new BABYLON.Debug.AxesViewer(scene, size.width / 10);
                    axes.xAxis.parent = display;
                    axes.yAxis.parent = display;
                    axes.zAxis.parent = display;

                    const mainaxes = new BABYLON.Debug.AxesViewer(scene, size.width / 5);
                }

                return scene;
            }

            window.onload = async () => {
                const canvas = document.getElementById("mapcanvas3d"); // Get the canvas element
                const engine = new BABYLON.Engine(canvas, true); // Generate the BABYLON 3D engine
                const scene = await createScene(canvas, engine); //Call the createScene function
                scene.debugLayer.show();
                // Register a render loop to repeatedly render the scene
                engine.runRenderLoop(function () {
                    scene.render();
                });

                // Watch for browser/canvas resize events
                window.addEventListener("resize", function () {
                    engine.resize();
                });
            };
        </script>
    </body>
</html>
