<!DOCTYPE html>
<html>
    <head>
        <title>Exemple de dessin de tuiles sur canvas</title>
        <script src="../../dev/core/bundles/spacexr.1.0.0.js"></script>
        <script src="./scripts/inputs.js"></script>
        <style>
            html,
            body {
                height: 100%;
                margin: 0;
            }
            #tileCanvas {
                width: 100%;
                height: 100%;
                display: block;
                touch-action: none;
            }
        </style>
    </head>
    <body>
        <canvas id="tileCanvas"></canvas>
        <script>
            window.onload = () => {
                // Récupérer le canvas
                const canvas = document.getElementById("tileCanvas");

                // initialiser la localisation et le niveau de zoom
                let center = new SPACEXR.Geo2(27.98817689833976, 86.92491071824738); // everest
                const lod = 11;

                // definir la source de donnée.
                const terrariumImgClient = SPACEXR.MapZen.DemImagesClient();
                const metricOptions = new SPACEXR.TileMetricsOptionsBuilder().withMaxLOD(SPACEXR.MapZen.MaxLevelOfDetail).withCellSize(1).build();
                const mapzenMetrics = new SPACEXR.EPSG3857(metricOptions);
                // construire la carte.
                const map = new SPACEXR.CanvasTileMap(canvas, terrariumImgClient, mapzenMetrics, center, lod);

                function onDrag(m, dx, dy, b) {
                    switch (b) {
                        case 0: {
                            map.translate(-dx, -dy);
                            break;
                        }
                        case 2: {
                            map.rotate(dx);
                            break;
                        }
                    }
                }

                function onWheel(m, dz) {
                    if (dz < 0) {
                        // zoom in
                        map.zoomIn(dz);
                    } else {
                        // zoom out
                        map.zoomOut(dz);
                    }
                }

                const translateManager = new MouseDragInputs(canvas, { ondrag: onDrag });
                const zoomManager = new MouseWheelInputs(canvas, { onwheel: onWheel, inc: 0.1 });
            };
        </script>
    </body>
</html>
