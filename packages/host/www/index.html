<!DOCTYPE html>
<html>
    <head>
        <title>Exemple de dessin de tuiles sur canvas</title>
        <script src="../../dev/core/bundles/spacexr.1.0.0.js"></script>
        <script src="./scripts/inputs.js"></script>
        <style>
            #tileCanvas {
                width: 100%;
                height: 100%;
                touch-action: none;
            }
        </style>
    </head>
    <body>
        <canvas id="tileCanvas"></canvas>
        <script>
            window.onload = () => {
                // Récupérer le canvas
                const canvas = document.getElementById("tileCanvas");
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;

                // initialiser la localisation et le niveau de zoom
                let center = new SPACEXR.Geo2(27.98817689833976, 86.92491071824738); // everest
                const lod = 11;

                // definir la source de donnée.
                const terrariumImg = new SPACEXR.TileClient(SPACEXR.MapZenTileClientOptions.DEMImages);
                const directory = new SPACEXR.TilePyramid(new SPACEXR.EPSG3857(), terrariumImg);

                // construire la carte.
                const map = new SPACEXR.CanvasTileMap(canvas, directory, center.lat, center.lon, lod);

                function onResize() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    map.invalidateSize();
                    map.validate();
                }

                function onBegin(m, x, y) {}
                function onMove(m, x, y) {
                    map.translate(x, y);
                }
                function onEnd(m, x, y) {}

                const mouseManager = new MouseInputs(canvas, onBegin, onMove, onEnd);

                // Watch for browser/canvas resize events
                window.addEventListener("resize", onResize);
            };
        </script>
    </body>
</html>
