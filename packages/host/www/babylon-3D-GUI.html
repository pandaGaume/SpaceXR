<!DOCTYPE html>
<html>
    <head>
        <title>Exemple de dessin de tuiles holographique avec support GUI 2D</title>
        <script src="./libs/babylon.js"></script>
        <script src="./libs/babylonjs.loaders.js"></script>
        <script src="./libs/babylon.glTF2FileLoader.js"></script>
        <script src="./libs/babylon.gui.js"></script>
        <script src="./libs/babylon.inspector.bundle.js"></script>

        <script src="../../dev/babylon/bundles/stellar_landscape_xr.1.0.0.js"></script>
        <style>
            #mapcanvas3d {
                width: 100%;
                height: 100%;
            }
            #compass {
                position: absolute;
                top: 20px;
                right: 20px;
                width: 200px;
                height: 200px;
                transform-origin: center;
            }

            #compassImage {
                width: 100%;
                height: 100%;
            }

            #zoomin {
                position: absolute;
                top: 250px;
                right: 90px;
                width: 64px;
                height: 64px;
                transform-origin: center;
            }

            #zoominImage {
                width: 100%;
                height: 100%;
            }

            #zoomout {
                position: absolute;
                top: 340px;
                right: 74px;
                width: 64px;
                height: 64px;
                transform-origin: center;
            }

            #zoomoutImage {
                width: 100%;
                height: 100%;
                -webkit-transform: scaleX(-1);
                transform: scaleX(-1);
            }
        </style>
    </head>
    <body>
        <div id="mapcontainer">
            <canvas id="mapcanvas3d"></canvas>
            <div id="compass">
                <img id="compassImage" src="./images/compass.png" alt="Compass" />
            </div>
            <div id="zoomin">
                <img id="zoominImage" src="./images/zoom_in.png" alt="Zoom_in" />
            </div>
            <div id="zoomout">
                <img id="zoomoutImage" src="./images/zoom_out.png" alt="Zoom_out" />
            </div>
        </div>
        <script>
            async function createScene(canvas, engine) {
                // This creates a basic Babylon Scene object (non-mesh)
                const scene = new BABYLON.Scene(engine);
                // Parameters: name, alpha, beta, radius, target position, scene
                // const camera = new BABYLON.ArcRotateCamera("Camera", Math.PI, Math.PI / 4, 200, new BABYLON.Vector3(0, 150, 0), scene);
                const camera = new BABYLON.ArcRotateCamera("Camera", 0, 60 * Math.PI / 180, 350, new BABYLON.Vector3(0, 0, 0), scene);

                // camera.setTarget(new BABYLON.Vector3(0, 50, 0));
                camera.wheelPrecision = 1;
                camera.minZ = 0;
                // This attaches the camera to the canvas
                camera.attachControl(canvas, true);
                // This creates a light, aiming 0,1,0 - to the sky (non-mesh)
                const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
                // Default intensity is 1. Let's dim the light a small amount
                light.intensity = 0.7;

                BABYLON.SceneLoader.ImportMesh(null, "./models/", "holographic_table.glb", scene, function (meshes) {
                    meshes[0].position = new BABYLON.Vector3(-25, 0, -10);
                    meshes[0].scaling = new BABYLON.Vector3(-100, 100, 100);
                });

                // create a basic table (in centimeter)
                const h = 170;
                const w = 270;
                const t = 100;

                // create an hologram display reference with a 96 dpi
                const display = new SPACEXR.SurfaceMapDisplay(
                    "display",
                    { height: h, width: w, thickness: t },
                    { width: 1280, height: 720, thickness: 720 }, // in 'pixel', ratio of 16/9
                    scene
                );
                display.position.y = 90;
                display.rotation.x = -Math.PI / 2;
                display.rotation.z = -Math.PI / 2;
                const displayMaterial = new BABYLON.StandardMaterial("display_material", scene);
                displayMaterial.diffuseColor = new BABYLON.Color3(0, 0, 0);
                displayMaterial.alpha = 0.5;
                display.material = displayMaterial;
                display.freezeWorldMatrix();

                camera.setTarget(display);

                // definir la source de donnée.
                const demClient = SPACEXR.MapZen.DemClient();
                const layerClient = SPACEXR.Google.SatelliteClient2d();
                const mapOptions = {
                    center: SPACEXR.KnownPlaces.Mountains.Matterhorn,
                    levelOfDetail: 12,
                    layerClient: layerClient,
                    exageration: 1.5,
                    lodTransition: 0,
                    insets: new BABYLON.Vector3(0, 0, 10),
                };

                // construire la carte.
                const map = new SPACEXR.SurfaceTileMap("terrain", display, demClient, mapOptions, scene);

                //#region 3D GUI
                
                // #43e1be
                const lightBlue = new BABYLON.Color3(67 / 255, 225 / 255, 190 / 255);
                scene.ambientColor = lightBlue;
                // var anchor = new BABYLON.TransformNode("");
                const manager = new BABYLON.GUI.GUI3DManager(scene);
                manager.useRealisticScaling = true;
                const panel = new BABYLON.GUI.PlanePanel();
                manager.addControl(panel);
                panel.margin = 0.2;
                panel.scaling = new BABYLON.Vector3(12, 12, 12);

                var addButton = function () {
                    var button = new BABYLON.GUI.HolographicButton("orientation");
                    panel.addControl(button);

                    button.text = "Button #" + panel.children.length;
                }

                // update layout only after all controls have been added
                panel.blockLayout = true;
                // for (var index = 0; index < 3; index++) {
                //     addButton();
                // }

                // BABYLON.SceneLoader.ImportMeshAsync("", "https://assets.babylonjs.com/meshes/", "both_houses_scene.babylon").then((result) => {
                //     const house1 = scene.getMeshByName("detached_house");
                //     house1.scaling = new BABYLON.Vector3(2, 2, 2);
                //     const meshButton = new BABYLON.GUI.MeshButton3D(house1, "meshButton");
                //     panel.addControl(meshButton);
                //     // house1.position.y = 2;
                //     // const house2 = result.meshes[2];
                //     // house2.position.y = 1;
                // });

                const twoDimensionButton = new BABYLON.GUI.Button3D("reset");
                const text = new BABYLON.GUI.TextBlock();
                text.text = "reset";
                text.color = "white";
                text.fontSize = 24;
                twoDimensionButton.content = text;
                panel.addControl(twoDimensionButton);

                // Mesh button
                const faceWidth = 512,
                    textureWidth = 1076;
                const meshOptions = {
                    width: 1,
                    height: 1,
                    depth: 0.1,
                    faceUV: [
                        new BABYLON.Vector4(faceWidth / textureWidth, 0, 2 * faceWidth / textureWidth, 1), // rear
                        new BABYLON.Vector4(0, 0, faceWidth / textureWidth, 1), // front
                        new BABYLON.Vector4(2 * faceWidth / textureWidth, 0, 1, 1), // right
                        new BABYLON.Vector4(2 * faceWidth / textureWidth, 0, 1, 1), // left
                        new BABYLON.Vector4(2 * faceWidth / textureWidth, 0, 1, 1), // top
                        new BABYLON.Vector4(2 * faceWidth / textureWidth, 0, 1, 1) // bottom
                    ]
                };
                const box = BABYLON.MeshBuilder.CreateBox("box", meshOptions);
                const dvMaterial = new BABYLON.StandardMaterial("dvButtonMaterial", scene);
                dvMaterial.ambientColor = new BABYLON.Color3(1, 1, 1);
                // dvMaterial.diffuseColor = lightBlue;
                // dvMaterial.ambientColor = new BABYLON.Color3(0.5, 0.5, 0.5);
                // dvMaterial.alpha = 0.8;
                dvMaterial.diffuseTexture = new BABYLON.Texture("textures/search-button-texture.png", scene);
                // dvMaterial.diffuseTexture.hasAlpha = true;
                dvMaterial.alphaMode = BABYLON.Engine.ALPHA_MAXIMIZED;
                // dvMaterial.wireframe = true;
                box.material = dvMaterial;
                box.visibility = 0.9999;
                const meshButton = new BABYLON.GUI.MeshButton3D(box, "meshButton");
                panel.addControl(meshButton);

                panel.blockLayout = false;
                panel.position.x = 150;
                panel.position.y = 100; // "height"
                panel.position.z = 50; // parallel to table
                panel.node.rotation = new BABYLON.Vector3(0,  - Math.PI / 2, 0);
                //#endregion

                //map.view.centerObservable.add((arg) => minimap2D.setView(arg.newValue));
                //map.view.zoomObservable.add((arg) => minimap2D.setZoom(arg.newValue));
                //map.view.azimuthObservable.add((arg) => minimap2D.setAzimuth(arg.newValue));

                // interaction avec la carte
                // Warning !! this MUST be include into a Manager somewhere
                let startingPixel;

                var getDisplayPosition = function () {
                    var pickinfo = scene.pick(scene.pointerX, scene.pointerY, function (mesh) {
                        return mesh == display;
                    });
                    if (pickinfo.hit) {
                        return pickinfo.pickedPoint;
                    }

                    return null;
                };

                var pointerDown = function (mesh) {
                    const current = getDisplayPosition();
                    if (current) {
                        startingPixel = map.display.getPixelToRef(current);
                        // we need to disconnect camera from canvas
                        setTimeout(function () {
                            camera.detachControl(canvas);
                        }, 0);
                    }
                };

                var pointerUp = function () {
                    if (startingPixel) {
                        camera.attachControl(canvas, true);
                        startingPixel = null;
                        return;
                    }
                };

                var getAngle = function (x, y) {
                    var angle = Math.atan2(y, x);
                    var degrees = (180 * angle) / Math.PI;
                    return (360 + Math.round(degrees)) % 360;
                };

                var pointerMove = function (pointerInfo) {
                    if (startingPixel) {
                        const current = getDisplayPosition();
                        if (current) {
                            const pixelXY = map.display.getPixelToRef(current);
                            const diff = pixelXY.subtract(startingPixel);
                            if (diff.x == 0 && diff.y == 0) {
                                return;
                            }
                            switch (pointerInfo.event.buttons) {
                                case 1: {
                                    map.translate(diff.x, diff.y);
                                    break;
                                }
                                case 2: {
                                    const l = diff.x;
                                    map.rotate(l);
                                    updateCompassRotation(map.azimuth);
                                    break;
                                }
                            }
                            startingPixel = pixelXY;
                        }
                    }
                };

                scene.onPointerObservable.add((pointerInfo) => {
                    switch (pointerInfo.type) {
                        case BABYLON.PointerEventTypes.POINTERDOWN:
                            if (pointerInfo.pickInfo.hit) {
                                pointerDown(pointerInfo.pickInfo.pickedMesh);
                            }
                            break;
                        case BABYLON.PointerEventTypes.POINTERUP:
                            pointerUp();
                            break;
                        case BABYLON.PointerEventTypes.POINTERMOVE:
                            pointerMove(pointerInfo);
                            break;
                    }
                });

                updateCompassRotation = function (rotation) {
                    var compass = document.getElementById("compass");
                    compass.style.transform = "rotate(" + rotation + "deg)";
                };

                // Function to handle the compass click event
                handleCompassClick = function (event) {
                    map.setAzimuth(0);
                    updateCompassRotation(0);
                };

                // Add a click event listener to the compass
                var compass = document.getElementById("compass");
                compass.addEventListener("click", handleCompassClick);

                // Add a click event listener to the zoom in button
                var zoomInBt = document.getElementById("zoomin");
                zoomInBt.addEventListener("click", () => {
                    map.zoomIn(0.1);
                    // minimap2D.zoomIn(0.1);
                });

                // Add a click event listener to the zoom out button
                var zoomOutBt = document.getElementById("zoomout");
                zoomOutBt.addEventListener("click", () => {
                    map.zoomOut(0.1);
                    // minimap2D.zoomOut(0.1);
                });

                //

                // debug panels
                //scene.debugLayer.show();

                return scene;
            }

            window.onload = async () => {
                const canvas = document.getElementById("mapcanvas3d"); // Get the canvas element
                const engine = new BABYLON.Engine(canvas, true); // Generate the BABYLON 3D engine
                const scene = await createScene(canvas, engine); //Call the createScene function
                // scene.debugLayer.show();
                // Register a render loop to repeatedly render the scene
                engine.runRenderLoop(function () {
                    scene.render();
                });

                // Watch for browser/canvas resize events
                window.addEventListener("resize", function () {
                    engine.resize();
                });
            };
        </script>
    </body>
</html>
