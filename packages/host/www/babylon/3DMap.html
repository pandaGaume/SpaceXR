<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Exemple d'un ecrans virtuel</title>
        <script src="../libs/babylon.js"></script>
        <script src="../libs/babylon.inspector.bundle.js"></script>
        <script src="../libs/babylon.glTF2FileLoader.min.js"></script>

        <script src="../../../dev/babylon/bundles/stellar_landscape_xr.1.0.0.js"></script>
        <style>
            html,
            body {
                overflow: hidden;
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
            }

            #mapcanvas3d {
                width: 100%;
                height: 100%;
            }
            .babylon-purple-bg {
                background-color: #34344a;
                color: white;
            }
            header {
                border-bottom: 10px solid #34344a;
            }
            h1 {
                font-size: 32px;
            }
            p {
                font-size: 20px;
            }
        </style>
    </head>
    <body>
        <header class="babylon-purple-bg">
            <h1>3D Map Holographic Display</h1>
            <!--            <p>
                Example of a world's topography "holographic" map based on a virtual screen. This holographic map is a 3D representation of the global terrain and elevations. The data used for this map
                comes from Mapzen, but it could also be sourced from other elevation data providers. 
                <p>The map is hosted on an interactive display surface that tracks your inputs. Here's how to navigate the map:</p>
                <ul>
                    <li><strong>Dragging the Map:</strong> Click and hold the left mouse button to drag the map.</li>
                    <li><strong>Rotating the Map:</strong> Click and hold the right mouse button to rotate the map.</li>
                    <li><strong>Zooming:</strong> Use the mouse wheel to zoom in and out when the pointer is over the map.</li>
                </ul>
                <p>Tiles are loaded dynamically during these navigation actions to ensure a smooth and seamless experience.</p>
             </p>-->
        </header>
        <div id="mapcontainer">
            <canvas id="mapcanvas3d"></canvas>
        </div>
        <script>
            const defaultCenter = SPACEXR.KnownPlaces.Mountains.MontBlanc; // everest
            const defaultLod = 11;

            function createGlassMaterial(scene, reflectionTexture, refractionTexture) {
                // Create a PBR material
                const glass = new BABYLON.PBRMaterial("glass", scene);
                glass.reflectionTexture = reflectionTexture;
                glass.refractionTexture = refractionTexture;
                glass.linkRefractionWithTransparency = true;
                glass.indexOfRefraction = 0.52;
                glass.alpha = 0.5;
                glass.microSurface = 1; // Controls the roughness of the material
                glass.albedoColor = new BABYLON.Color3(0.1, 0.1, 0.3);
                glass.roughness = 0.2;
                glass.backFaceCulling = false;
                return glass;
            }

            async function createScene(canvas, engine) {
                const unit = 1;
                const scene = new BABYLON.Scene(engine);
                // Parameters: name, alpha, beta, radius, target position, scene
                const camera = new BABYLON.ArcRotateCamera("Camera", Math.PI / 4, Math.PI / 3, 3 * unit, new BABYLON.Vector3(0, 0, 0), scene);

                camera.setTarget(new BABYLON.Vector3(0, 0, 0));
                camera.wheelPrecision = 10;
                camera.minZ = 0;
                // This attaches the camera to the canvas
                camera.attachControl(canvas, true);

                // This creates a light, aiming 0,1,0 - to the sky (non-mesh)
                const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
                // Default intensity is 1. Let's dim the light a small amount
                light.intensity = 0.8;
                light.diffuse = new BABYLON.Color3(1, 1, 1);

                //const pointLight = new BABYLON.PointLight("pointLight", new BABYLON.Vector3(10, 2, 0), scene);
                //pointLight.diffuse = new BABYLON.Color3(0.5, 0.5, 0.5);
                //pointLight.intensity = 1;

                // create a basic table (in centimeter)
                const size = {
                    width: 3.2 * unit,
                    height: 2.4 * unit,
                };

                const resolution = SPACEXR.VirtualDisplay.SD;

                // set the virtual display
                const buildClipPlane = true;
                const display = new SPACEXR.HolographicDisplay("holographicDisplay", size, resolution, scene);
                display.material = createGlassMaterial(scene);
                display.rotation.x = (3 * Math.PI) / 2;
                display.freezeWorldMatrix();

                camera.setTarget(display);

                // build the map options
                const mapOptions = {};

                // build the map
                const map = new SPACEXR.Map3d("map", mapOptions, scene).setViewMap(defaultCenter, defaultLod).withDisplay(display);

                // build layer options
                const demLayerOptions = {
                    attribution: SPACEXR.MapZen.Attribution,
                    exageration: 1,
                    insets: new BABYLON.Vector3(0, 0, 0.1),
                    color: new BABYLON.Color4(0.5, 0.5, 0.8),
                    shininess: 0,
                    textureResolution: { width: 512, height: 512 },
                };

                // build layer and add it to the map
                let client = SPACEXR.MapZen.DemClient();
                const l = new SPACEXR.ElevationLayer(`${client.name}`, client, demLayerOptions).addTo(map);

                const imageLayerOptions = {
                    zoomOffset: 1,
                    alpha: 1.0,
                    background: "rgb(.5,.5,.5)",
                };

                client = SPACEXR.Google.SatelliteClient2d();
                const t = new SPACEXR.ImageLayer(`${client.name}`, client, imageLayerOptions).addTo(map);

                const showAxes = false;
                if (showAxes) {
                    const axes = new BABYLON.Debug.AxesViewer(scene, size.width / 10);
                    axes.xAxis.parent = display;
                    axes.yAxis.parent = display;
                    axes.zAxis.parent = display;

                    const mainaxes = new BABYLON.Debug.AxesViewer(scene, size.width / 5);
                }

                return scene;
            }

            window.onload = async () => {
                const canvas = document.getElementById("mapcanvas3d"); // Get the canvas element
                const engine = new BABYLON.Engine(canvas, true); // Generate the BABYLON 3D engine
                const scene = await createScene(canvas, engine); //Call the createScene function
                scene.debugLayer.show();

                // Register a render loop to repeatedly render the scene
                engine.runRenderLoop(function () {
                    scene.render();
                });

                // Watch for browser/canvas resize events
                window.addEventListener("resize", function () {
                    engine.resize();
                });
            };
        </script>
    </body>
</html>
