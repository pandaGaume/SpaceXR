<body>
    <canvas id="command-panel-canvas" width="800" height="500"></canvas>
    <script>

        function computeSize(containerSize, cssSize) {
            if (typeof cssSize === 'string') {
                if (cssSize.endsWith('%')) {
                    const percentage = Number.parseFloat(cssSize.slice(0, -1));
                    return containerSize * percentage / 100;
                }
            } else if (typeof cssSize === 'number') {
                return cssSize;
            }
            throw Error('Size must be expressed as percentage or number.');
        }

        function drawBeveledButton(canvas, width, height, x, y) {
            const ctx = canvas.getContext('2d');
            // Draw button background
            ctx.fillStyle = 'rgba(173, 216, 230, 0.5)'; // Light blue with transparency
            ctx.strokeStyle = '#8fe9dd';
            ctx.lineWidth = 1;
            const borderRadius = 2;
            const bevelSize = 10;
            ctx.beginPath();
            ctx.moveTo(x + borderRadius, y);
            ctx.lineTo(x + width, y);
            ctx.lineTo(x + width, y + height - bevelSize);
            ctx.lineTo(x + width - bevelSize, y + height);
            ctx.lineTo(x, y + height);
            ctx.lineTo(x, y + borderRadius);
            ctx.quadraticCurveTo(x, y, x + borderRadius, y);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Set text properties
            ctx.font = 'bold 20px Electrolize';
            ctx.fillStyle = '#8fe9dd';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Calculate text position
            const textX = x + (width / 2);
            const textY = y + (height / 2);

            // Draw text
            ctx.fillText('Open', textX, textY);
        }

        window.onload = () => {

            ctx.fillStyle = '#071d2f';
