<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>T3 Tensegrity Prism – BabylonJS</title>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    canvas { width: 100%; height: 100%; touch-action: none; }
  </style>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
</head>
<body>
<canvas id="renderCanvas"></canvas>

<script>
const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas, true);

function createTPrism(scene, n = 3, R = 1, h = 3, theta = 2.5 * Math.PI / 3, helixStep = 2, strutStep = 0) {
  const bottom = [];
  const top = [];

  for (let i = 0; i < n; i++) {
    const a = (2 * Math.PI * i) / n;
    bottom.push(new BABYLON.Vector3(R * Math.cos(a), 0, R * Math.sin(a)));
    top.push(new BABYLON.Vector3(R * Math.cos(a + theta), h, R * Math.sin(a + theta)));
  }

  function addLine(p1, p2, color) {
    const l = BABYLON.MeshBuilder.CreateLines("l", { points: [p1, p2] }, scene);
    l.color = color;
    return l;
  }

  function addStrut(p1, p2, diameter = 0.12, color = BABYLON.Color3.Red()) {
    const dir = p2.subtract(p1);
    const len = dir.length();

    const bar = BABYLON.MeshBuilder.CreateCylinder("bar", { height: len, diameter }, scene);
    bar.position = p1.add(p2).scale(0.5);

    // Cylindre aligne sur +Y par defaut
    const up = new BABYLON.Vector3(0, 1, 0);
    const v = dir.scale(1 / len);

    let d = BABYLON.Vector3.Dot(up, v);
    d = Math.max(-1, Math.min(1, d));

    const axis = BABYLON.Vector3.Cross(up, v);
    const axisLen = axis.length();

    if (axisLen < 1e-8) {
      bar.rotationQuaternion = (d > 0)
        ? BABYLON.Quaternion.Identity()
        : BABYLON.Quaternion.RotationAxis(BABYLON.Axis.X, Math.PI);
    } else {
      const angle = Math.acos(d);
      bar.rotationQuaternion = BABYLON.Quaternion.RotationAxis(axis.scale(1 / axisLen), angle);
    }

    const mat = new BABYLON.StandardMaterial("barMat", scene);
    mat.emissiveColor = color;
    bar.material = mat;

    return bar;
  }

  // Cables perimetre
  for (let i = 0; i < n; i++) {
    addLine(bottom[i], bottom[(i + 1) % n], BABYLON.Color3.Blue());
    addLine(top[i], top[(i + 1) % n], BABYLON.Color3.Blue());
  }

  // Cables helicoidaux (verts) : bottom[i] -> top[i + helixStep]
  for (let i = 0; i < n; i++) {
    addLine(bottom[i], top[(i + helixStep) % n], BABYLON.Color3.Green());
  }

  // Barres (rouges) : bottom[i] -> top[i + strutStep]
  for (let i = 0; i < n; i++) {
    addStrut(bottom[i], top[(i + strutStep) % n], 0.12, BABYLON.Color3.Red());
  }

  return { bottom, top };
}


const createScene = () => {
    const scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color4(0.03, 0.03, 0.05, 1);

    const camera = new BABYLON.ArcRotateCamera(
        "cam",
        Math.PI / 4,
        Math.PI / 3,
        10,
        BABYLON.Vector3.Zero(),
        scene
    );
    camera.attachControl(canvas, true);

    new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);

    createTPrism(scene, 3, 1, 3, 2.5 * Math.PI / 3, 2, 0);

    return scene;
};

const scene = createScene();
engine.runRenderLoop(() => scene.render());
window.addEventListener("resize", () => engine.resize());
</script>
</body>
</html>
