<!DOCTYPE html>
<html>
    <head>
        <title>Exemple de dessin de tuiles sur canvas</title>
        <script src="./libs/babylon.js"></script>
        <script src="./libs/babylonjs.loaders.js"></script>
        <script src="./libs/babylon.glTF2FileLoader.js"></script>
        <script src="./libs/babylon.inspector.bundle.js"></script>

        <script src="../../dev/babylon/bundles/stellar_landscape_xr.1.0.0.js"></script>
        <script src="./scripts/inputs.js"></script>
        <style>
            #mapcanvas3d {
                width: 100%;
                height: 100%;
            }
            #compass {
                position: absolute;
                top: 20px; /* Adjust this to position the compass */
                right: 20px; /* Adjust this to position the compass */
                width: 200px; /* Adjust this according to your compass image size */
                height: 200px; /* Adjust this according to your compass image size */
                transform-origin: center;
            }

            #compassImage {
                width: 100%;
                height: 100%;
            }
        </style>
    </head>
    <body>
        <div id="mapcontainer">
            <canvas id="mapcanvas3d"></canvas>
            <div id="compass">
                <img id="compassImage" src="./images/compass.png" alt="Compass" />
            </div>
        </div>
        <script>
            function createScene(canvas, engine) {
                // This creates a basic Babylon Scene object (non-mesh)
                const scene = new BABYLON.Scene(engine);
                // Parameters: name, alpha, beta, radius, target position, scene
                const camera = new BABYLON.ArcRotateCamera("Camera", Math.PI / 4, Math.PI / 4, 100, new BABYLON.Vector3(0, 150, 0), scene);
                camera.setTarget(new BABYLON.Vector3(0, 150, 0));
                camera.wheelPrecision = 100;
                camera.minZ = 0;
                // This attaches the camera to the canvas
                camera.attachControl(canvas, true);
                // This creates a light, aiming 0,1,0 - to the sky (non-mesh)
                const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
                // Default intensity is 1. Let's dim the light a small amount
                light.intensity = 0.7;

                // BABYLON.SceneLoader.Append("./models/", "holographic_table.glb", scene, function (scene) {});

                // create a basic table (in centimeter)
                const h = 90;
                const w = 160;
                const t = 100;

                // create an hologram display reference with a 96 dpi
                const display = new SPACEXR.SurfaceMapDisplay(
                    "display",
                    { height: h, width: w, thickness: t },
                    { width: 640, height: 360, thickness: 360 }, // in 'pixel', ratio of 16/9
                    scene
                );
                display.position.y = 90;
                display.rotation.x = -Math.PI / 2;
                const displayMaterial = new BABYLON.StandardMaterial("display_material", scene);
                displayMaterial.diffuseColor = new BABYLON.Color3(0, 0, 0);
                displayMaterial.alpha = 0.4;
                display.material = displayMaterial;
                display.freezeWorldMatrix();

                camera.setTarget(display);

                // definir la source de donnée.
                // const demClient = SPACEXR.MapZen.DemClient();
                const demClient = new SPACEXR.DemTileWebClient(SPACEXR.MapZen.ElevationsClient(), SPACEXR.MapZen.NormalsImagesClient());

                const options = {
                    center: new SPACEXR.Geo2(27.98817689833976, 86.92491071824738), // everest,
                    levelOfDetail: 12,
                    insets: new SPACEXR.Cartesian3(0, 0, 10),
                };

                // construire la carte.
                const map = new SPACEXR.SurfaceTileMap("map", display, demClient, options, scene);

                const template = map.template;
                template.registerInstancedBuffer("demInfos", 4); // dem infos
                template.registerInstancedBuffer("textureIds", 2); // id elevations, id normals

                const materialName = "tilemap";
                const shaderOptions = {
                    attributes: ["position", "uv", "demInfos", "textureIds"],
                    uniforms: ["world", "viewProjection", "altitudes", "normals", "light", "material", "northClip", "southClip", "westClip", "eastClip", "minAlt"],
                };

                var m = new BABYLON.ShaderMaterial(
                    materialName,
                    scene,
                    {
                        vertex: materialName,
                        fragment: materialName,
                    },
                    shaderOptions
                );

                m.setVector3("light.ambient", new BABYLON.Vector3(0.2, 0.2, 0.2));
                m.setVector3("material.ambient", new BABYLON.Vector3(0.1, 0.5, 0.8));
                m.setVector3("light.diffuse", new BABYLON.Vector3(0.5, 0.5, 0.5));
                m.setVector3("material.diffuse", new BABYLON.Vector3(0.5, 0.8, 0.8));

                m.setVector3("light.direction", new BABYLON.Vector3(1, 1, 1).normalize());

                const axes = display.getXYZWorldVectors();
                const w2 = w / 2;
                const h2 = h / 2;

                const vx = axes[0].multiply(new BABYLON.Vector3(w2, w2, w2));
                const vy = axes[1].multiply(new BABYLON.Vector3(h2, h2, h2));

                const p = display.getAbsolutePosition();

                let a = p.subtract(vy);
                let b = axes[1];
                m.setVector3("northClip.point", a);
                m.setVector3("northClip.normal", b);

                let a1 = p.add(vy);
                let b1 = axes[1].negate();
                m.setVector3("southClip.point", a1);
                m.setVector3("southClip.normal", b1);

                let a2 = p.subtract(vx);
                let b2 = axes[0];
                m.setVector3("westClip.point", a2);
                m.setVector3("westClip.normal", b2);

                let a3 = p.add(vx);
                let b3 = axes[0].negate();
                m.setVector3("eastClip.point", a3);
                m.setVector3("eastClip.normal", b3);

                const depth = 16;
                const s = demClient.metrics.tileSize;

                const tilePoolElevationOptions = new SPACEXR.TilePoolTextureOptions({
                    metrics: demClient.metrics,
                    count: depth,
                    format: BABYLON.Constants.TEXTUREFORMAT_R,
                    textureType: BABYLON.Constants.TEXTURETYPE_FLOAT,
                    samplingMode: BABYLON.Constants.TEXTURE_NEAREST_NEAREST,
                    internalFormat: engine._gl.R16F, // force internal format to save half space
                });

                const elevationSampler = new SPACEXR.TilePoolTexture("altitudes", tilePoolElevationOptions, scene);
                elevationSampler.WrapR = BABYLON.Texture.CLAMP_ADDRESS_MODE;

                m.setTexture("altitudes", elevationSampler);

                const tilePoolNormalOptions = new SPACEXR.TilePoolTextureOptions({
                    metrics: demClient.metrics,
                    count: depth,
                    format: BABYLON.Constants.TEXTUREFORMAT_RGB,
                    textureType: BABYLON.Constants.TEXTURETYPE_UNSIGNED_BYTE,
                    samplingMode: BABYLON.Constants.TEXTURE_BILINEAR_SAMPLINGMODE,
                    internalFormat: engine._gl.RGB8, // force internal format
                });

                const normalSampler = new SPACEXR.TilePoolTexture("normals", tilePoolNormalOptions, scene);

                m.setTexture("normals", normalSampler);

                map.template.material = m;

                const min = 10000;

                map.addedObservable.add((t) => {
                    const m = t.surface;
                    if (m) {
                        const c = t.content;
                        // add instance attributes
                        m.instancedBuffers.demInfos = new BABYLON.Vector4(c.min.z, c.max.z, c.delta, c.mean);
                        const elevationArea = elevationSampler.reserveArea();
                        const normalArea = normalSampler.reserveArea();
                        if (elevationArea && normalArea) {
                            if (c.min < min) {
                                min = c.min;
                                m.setFloat("minAlt", min);
                            }
                            elevationArea.update(c.elevations);
                            normalArea.update(c.normals);
                            t.elevationArea = elevationArea;
                            t.normalArea = normalArea;

                            m.instancedBuffers.textureIds = new BABYLON.Vector2(elevationArea.id, normalArea.id);
                        }
                    }
                });

                const insertFirst = true;
                map.removedObservable.add(
                    (t) => {
                        if (t.elevationArea) {
                            t.elevationArea.release();
                            t.elevationArea = undefined;
                        }
                        if (t.normalArea) {
                            t.normalArea.release();
                            t.normalArea = undefined;
                        }
                    },
                    -1,
                    insertFirst
                );

                map.view.validate();

                // interaction avec la carte
                let startingPixel;

                var getDisplayPosition = function () {
                    var pickinfo = scene.pick(scene.pointerX, scene.pointerY, function (mesh) {
                        return mesh == display;
                    });
                    if (pickinfo.hit) {
                        return pickinfo.pickedPoint;
                    }

                    return null;
                };

                var pointerDown = function (mesh) {
                    const current = getDisplayPosition();
                    if (current) {
                        startingPixel = map.display.getPixelToRef(current);
                        // we need to disconnect camera from canvas
                        setTimeout(function () {
                            camera.detachControl(canvas);
                        }, 0);
                    }
                };

                var pointerUp = function () {
                    if (startingPixel) {
                        camera.attachControl(canvas, true);
                        startingPixel = null;
                        return;
                    }
                };

                var pointerMove = function (pointerInfo) {
                    if (startingPixel) {
                        const current = getDisplayPosition();
                        if (current) {
                            const pixelXY = map.display.getPixelToRef(current);
                            const diff = pixelXY.subtract(startingPixel);
                            if (diff.x == 0 && diff.y == 0) {
                                return;
                            }
                            switch (pointerInfo.event.buttons) {
                                case 1: {
                                    map.translate(-diff.x, diff.y);
                                    break;
                                }
                                case 2: {
                                    map.rotate(diff.x);
                                    updateCompassRotation(map.rotation);
                                    break;
                                }
                            }
                            startingPixel = pixelXY;
                        }
                    }
                };

                scene.onPointerObservable.add((pointerInfo) => {
                    switch (pointerInfo.type) {
                        case BABYLON.PointerEventTypes.POINTERDOWN:
                            if (pointerInfo.pickInfo.hit) {
                                pointerDown(pointerInfo.pickInfo.pickedMesh);
                            }
                            break;
                        case BABYLON.PointerEventTypes.POINTERUP:
                            pointerUp();
                            break;
                        case BABYLON.PointerEventTypes.POINTERMOVE:
                            pointerMove(pointerInfo);
                            break;
                    }
                });

                updateCompassRotation = function (rotation) {
                    var compass = document.getElementById("compass");
                    compass.style.transform = "rotate(" + rotation + "deg)";
                };

                // Function to handle the compass click event
                handleCompassClick = function (event) {
                    map.setRotation(0);
                    updateCompassRotation(0);
                };

                // Get the compass element
                var compass = document.getElementById("compass");

                // Add a click event listener to the compass
                compass.addEventListener("click", handleCompassClick);

                const mainAxes = new BABYLON.AxesViewer(scene, 50);

                return scene;
            }

            window.onload = () => {
                const canvas = document.getElementById("mapcanvas3d"); // Get the canvas element
                const engine = new BABYLON.Engine(canvas, true); // Generate the BABYLON 3D engine
                const scene = createScene(canvas, engine); //Call the createScene function
                scene.debugLayer.show();
                // Register a render loop to repeatedly render the scene
                engine.runRenderLoop(function () {
                    scene.render();
                });

                // Watch for browser/canvas resize events
                window.addEventListener("resize", function () {
                    engine.resize();
                });
            };
        </script>
    </body>
</html>
