<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Exemple de dessin de tuiles sur canvas</title>
        <script src="../../dev/core/bundles/spacexr.1.0.0.js"></script>
        <script src="./scripts/inputs.js"></script>
        <style>
            html,
            body {
                height: 100%;
                margin: 0;
            }
            #tileCanvas {
                width: 100%;
                height: 100%;
                display: block;
                touch-action: none;
            }
            #compass {
                position: absolute;
                top: 20px; /* Adjust this to position the compass */
                right: 20px; /* Adjust this to position the compass */
                width: 200px; /* Adjust this according to your compass image size */
                height: 200px; /* Adjust this according to your compass image size */
                transform-origin: center;
            }

            #compassImage {
                width: 100%;
                height: 100%;
            }
        </style>
    </head>
    <body>
        <div id="mapContainer">
            <canvas id="tileCanvas"></canvas>
            <div id="compass">
              <img id="compassImage" src="./images/compass.png" alt="Compass">
            </div>
        <script>
            window.onload = () => {
                // Récupérer le canvas
                const canvas = document.getElementById("tileCanvas");

                // initialiser la localisation et le niveau de zoom
                let center = new SPACEXR.Geo2(27.98817689833976, 86.92491071824738); // everest
                const lod = 12;

                // definir la source de donnée.
                const tileClient = SPACEXR.Google.SatelliteClient2d() ;
                 
                // construire la carte.

                const map = new SPACEXR.Map("myMap", canvas).setView(center, lod);
                const layer = new SPACEXR.TileLayer("myLayer", tileClient).addTo(map);

                function onDrag(m, dx, dy, b) {
                    switch (b) {
                        case 0: {
                            // translate the center of the map according the drag displacement
                            // then we have to negate the drag displacement
                            map.translate(-dx, -dy);
                            break;
                        }
                        case 2: {
                            map.rotate(dx);
                            updateCompassRotation(map.azimuth);
                            break;
                        }
                    }
                }

                function onWheel(m, dz) {
                    if (dz < 0) {
                        // zoom in
                        map.zoomIn(dz);
                    } else {
                        // zoom out
                        map.zoomOut(dz);
                    }
                }
                
                function updateCompassRotation(azimuth) {
                    var compass = document.getElementById('compass');
                    compass.style.transform = 'rotate(' + azimuth + 'deg)';
                }

 
                    // Function to handle the compass click event
                function handleCompassClick(event) {
                    map.setAzimuth(0);
                    updateCompassRotation(0);
                }

                // Get the compass element
                var compass = document.getElementById('compass');

                // Add a click event listener to the compass
                compass.addEventListener('click', handleCompassClick);

                const translateManager = new MouseDragInputs(canvas, { ondrag: onDrag });

                translateManager.attachControl(canvas);
                const zoomManager = new MouseWheelInputs(canvas, { onwheel: onWheel, inc: 0.1 });

                document.addEventListener('keydown', function(event) {
                    if (event.ctrlKey) {
                        console.log('DOWN')
                    }
                });
                
                document.addEventListener('keyup', function(event) {
                    if (event.key === 'Control' || event.key === 'Meta') {
                          console.log('UP')
                     }
                });

            };
        </script>
    </body>
</html>
