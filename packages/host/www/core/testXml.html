<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XML Test</title>
    <script src="../libs/spacexr.1.0.0.js"></script>
 
    <style>
      :root {
        --bg: #0c0c0c;
        --fg: #d6d6d6;
        --muted: #9aa0a6;
        --border: #2b2b2b;
        --accent: #00d084;
        --font: Consolas, "Cascadia Mono", "Courier New", monospace;
      }

      body {
        margin: 0;
        padding: 24px;
        background: #111;
        color: var(--fg);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }

      .wrap {
        max-width: 900px;
        margin: 0 auto;
      }

      .title {
        margin: 0 0 12px 0;
        font-size: 18px;
        color: var(--fg);
      }

      .console {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px;
        height: 420px;
        overflow: auto;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.35);
        font-family: var(--font);
        font-size: 14px;
        line-height: 1.45;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .line {
        display: block;
      }

      .line .ts {
        color: var(--muted);
        margin-right: 10px;
      }

      .line .prompt {
        color: var(--accent);
        margin-right: 8px;
      }

      .controls {
        margin-top: 12px;
        display: flex;
        gap: 10px;
        align-items: center;
      }

      input {
        flex: 1;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #0f0f0f;
        color: var(--fg);
        font-family: var(--font);
        font-size: 14px;
        outline: none;
      }

      button {
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #1a1a1a;
        color: var(--fg);
        cursor: pointer;
      }

      button:hover {
        background: #222;
      }

      .hint {
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1 class="title">Test Console</h1>

      <div id="console" class="console" aria-label="console output"></div>

      <div class="controls">
        <input id="cmd" type="text" placeholder="Type here, press Enter..." autocomplete="off" />
        <button id="runBtn" type="button">Run</button>
        <button id="clearBtn" type="button">Clear</button>
      </div>

      <div class="hint">
        buildText() is called on load and when you click Run. Edit buildText() to return whatever you want.
      </div>
    </div>

    <script>
      function buildText0() {
        const NS_EX = "urn:example";
        const NS_XSI = "http://www.w3.org/2001/XMLSchema-instance";

        const w= new SPACEXR.StringXmlWriter();
        const b = new SPACEXR.XmlBuilder(w);
        b.dec("1.0", "UTF-8");
        b.ele(null, "root")
            // declare namespaces on the root element
            .att("xmlns", "ex", NS_EX)
            .att(null, "xmlns:xsi", NS_XSI)
            // now use them by passing the URI as first arg
            .ele(NS_EX, "innerSingle").end()            
            .ele(NS_EX, "inner")
            .att(NS_XSI, "type", "ex:MyType")
            .text("\nhello world")
           .text("\nhello world\n")
            .end()
            .end();
        return w.toString();
      }

      function buildText() {

        const model = new SPACEXR.TMFModel();
        model.requiredExtensions = "myExtension"
        model.metadata = [
            new SPACEXR.TFMeta("designer", "DotVision"),
            new SPACEXR.TFMeta("description", "this is my beautifull model")
        ];

        const w= new SPACEXR.StringXmlWriter();
        const b = new SPACEXR.XmlBuilder(w);
        const s= new SPACEXR.XmlSerializer(b);
        s.serialize(model);

        return w.toString();
      }

      function nowTime() {
        const d = new Date();
        const hh = String(d.getHours()).padStart(2, "0");
        const mm = String(d.getMinutes()).padStart(2, "0");
        const ss = String(d.getSeconds()).padStart(2, "0");
        return `${hh}:${mm}:${ss}`;
      }

      function writeLine(text, { prompt = ">" } = {}) {
        const consoleEl = document.getElementById("console");
        const line = document.createElement("div");
        line.className = "line";
        line.innerHTML =
          `<span class="ts">[${nowTime()}]</span>` +
          `<span class="prompt">${prompt}</span>` +
          `<span class="msg"></span>`;
        line.querySelector(".msg").textContent = text;

        consoleEl.appendChild(line);
        consoleEl.scrollTop = consoleEl.scrollHeight;
      }

      function clearConsole() {
        document.getElementById("console").textContent = "";
      }

      function run() {
        const input = document.getElementById("cmd");
        const cmd = input.value.trim();

        if (cmd) {
          writeLine(cmd, { prompt: "C:\\>" });
          input.value = "";
        }

        const out = buildText();
        writeLine(out, { prompt: "" });
      }

      document.getElementById("runBtn").addEventListener("click", run);
      document.getElementById("clearBtn").addEventListener("click", clearConsole);
      document.getElementById("cmd").addEventListener("keydown", (e) => {
        if (e.key === "Enter") run();
      });

      writeLine("Console ready.", { prompt: "" });
      run();
      document.getElementById("cmd").focus();
    </script>
  </body>
</html>
