<!DOCTYPE html>
<html>
    <head>
        <title>Exemple de dessin de tuiles sur canvas</title>
        <script src="./libs/babylon.js"></script>
        <script src="./libs/babylonjs.loaders.js"></script>
        <script src="./libs/babylon.glTF2FileLoader.js"></script>
        <script src="./libs/babylon.inspector.bundle.js"></script>

        <script src="../../dev/babylon/bundles/stellar_landscape_xr.1.0.0.js"></script>
        <script src="./scripts/inputs.js"></script>
        <style>
            #mapcanvas3d {
                width: 100%;
                height: 100%;
            }
            #compass {
                position: absolute;
                top: 20px;
                right: 20px;
                width: 200px;
                height: 200px;
                transform-origin: center;
            }

            #compassImage {
                width: 100%;
                height: 100%;
            }

            #zoomin {
                position: absolute;
                top: 250px;
                right: 90px;
                width: 64px;
                height: 64px;
                transform-origin: center;
            }

            #zoominImage {
                width: 100%;
                height: 100%;
            }

            #zoomout {
                position: absolute;
                top: 340px;
                right: 74px;
                width: 64px;
                height: 64px;
                transform-origin: center;
            }

            #zoomoutImage {
                width: 100%;
                height: 100%;
                -webkit-transform: scaleX(-1);
                transform: scaleX(-1);
            }
        </style>
    </head>
    <body>
        <div id="mapcontainer">
            <canvas id="mapcanvas3d"></canvas>
            <div id="compass">
                <img id="compassImage" src="./images/compass.png" alt="Compass" />
            </div>
            <div id="zoomin">
                <img id="zoominImage" src="./images/zoom_in.png" alt="Zoom_in" />
            </div>
            <div id="zoomout">
                <img id="zoomoutImage" src="./images/zoom_out.png" alt="Zoom_out" />
            </div>
        </div>
        <script>
            function createScene(canvas, engine) {
                // This creates a basic Babylon Scene object (non-mesh)
                const scene = new BABYLON.Scene(engine);
                // Parameters: name, alpha, beta, radius, target position, scene
                const camera = new BABYLON.ArcRotateCamera("Camera", Math.PI / 4, Math.PI / 4, 200, new BABYLON.Vector3(0, 150, 0), scene);
                camera.setTarget(new BABYLON.Vector3(0, 50, 0));
                camera.wheelPrecision = 20;
                camera.minZ = 0;
                // This attaches the camera to the canvas
                camera.attachControl(canvas, true);
                // This creates a light, aiming 0,1,0 - to the sky (non-mesh)
                const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
                // Default intensity is 1. Let's dim the light a small amount
                light.intensity = 0.7;

                BABYLON.SceneLoader.ImportMesh(null, "./models/", "holographic_table.glb", scene, function (meshes) {
                    meshes[0].position = new BABYLON.Vector3(-25, 0, -10);
                    meshes[0].scaling = new BABYLON.Vector3(-100, 100, 100);
                });

                // create a basic table (in centimeter)
                const h = 170;
                const w = 270;
                const t = 100;

                // create an hologram display reference with a 96 dpi
                const display = new SPACEXR.SurfaceMapDisplay(
                    "display",
                    { height: h, width: w, thickness: t },
                    { width: 1280, height: 720, thickness: 720 }, // in 'pixel', ratio of 16/9
                    scene
                );
                display.position.y = 90;
                display.rotation.x = -Math.PI / 2;
                display.rotation.z = -Math.PI / 2;
                const displayMaterial = new BABYLON.StandardMaterial("display_material", scene);
                displayMaterial.diffuseColor = new BABYLON.Color3(0, 0, 0);
                displayMaterial.alpha = 0.1;
                display.material = displayMaterial;
                display.freezeWorldMatrix();

                camera.setTarget(display);

                // definir la source de donnée.
                const demClient = new SPACEXR.DemTileWebClient(SPACEXR.MapZen.ElevationsClient(), SPACEXR.MapZen.NormalsImagesClient());
                const layerClient = SPACEXR.Google.SatelliteClient2d();

                const mapboxDemoLocation = new SPACEXR.Geo2(32.7213, -114.26608);
                const everest = SPACEXR.KnownPlaces.Locations.Everest;
                const chamonix = SPACEXR.KnownPlaces.Locations.Chamonix;
                const mountRenier = SPACEXR.KnownPlaces.Locations.MountRainier;
                const corsica = new SPACEXR.Geo2(42.45082138532401, 8.833694458007812);

                const surfaceOptions = {
                    center: corsica,
                    levelOfDetail: 12,
                    exageration: 1.5,
                };

                // construire la carte.
                const map = new SPACEXR.SurfaceTileMap("map", display, demClient, surfaceOptions, scene);

                // construire le material - WARNING !!! This is temporary emplacement for this code, which is MUST beeing located into the map.
                const template = map.template;
                template.registerInstancedBuffer("demInfos", 4); // dem infos
                template.registerInstancedBuffer("demIds", 4);
                template.registerInstancedBuffer("layerIds", 4);

                const materialName = "tilemap";
                const shaderOptions = {
                    attributes: ["position", "uv", "demInfos", "demIds", "layerIds"],
                    uniforms: [
                        "world",
                        "viewProjection",
                        "altitudes",
                        "mapscale",
                        "normals",
                        "layer",
                        "light",
                        "material",
                        "northClip",
                        "southClip",
                        "westClip",
                        "eastClip",
                        "minAlt",
                    ],
                };

                var mat = new BABYLON.ShaderMaterial(
                    materialName,
                    scene,
                    {
                        vertex: materialName,
                        fragment: materialName,
                    },
                    shaderOptions
                );

                mat.setVector3("light.ambient", new BABYLON.Vector3(0.2, 0.2, 0.2));
                mat.setVector3("material.ambient", new BABYLON.Vector3(0.1, 0.5, 0.8));
                mat.setVector3("light.diffuse", new BABYLON.Vector3(0.5, 0.5, 0.5));
                mat.setVector3("material.diffuse", new BABYLON.Vector3(0.5, 0.8, 0.8));

                mat.setVector3("light.direction", new BABYLON.Vector3(1, 1, 1).normalize());

                const axes = display.getXYZWorldVectors();
                const w2 = w / 2;
                const h2 = h / 2;

                const vx = axes[0].multiply(new BABYLON.Vector3(w2, w2, w2));
                const vy = axes[1].multiply(new BABYLON.Vector3(h2, h2, h2));

                const p = display.getAbsolutePosition();

                let a = p.subtract(vy);
                let b = axes[1];
                mat.setVector3("northClip.point", a);
                mat.setVector3("northClip.normal", b);

                let a1 = p.add(vy);
                let b1 = axes[1].negate();
                mat.setVector3("southClip.point", a1);
                mat.setVector3("southClip.normal", b1);

                let a2 = p.subtract(vx);
                let b2 = axes[0];
                mat.setVector3("westClip.point", a2);
                mat.setVector3("westClip.normal", b2);

                let a3 = p.add(vx);
                let b3 = axes[0].negate();
                mat.setVector3("eastClip.point", a3);
                mat.setVector3("eastClip.normal", b3);

                const s = demClient.metrics.tileSize;
                const resw = display.resolution.width;
                const resh = display.resolution.height;
                // remember that this diagonal value is calculated as mid-zoom level, which mean
                // that the maximum size will be at lower zoom  and a scale of 1.5
                const diag = Math.sqrt(resw * resw + resh * resh) * 1.5;
                const ntiles = Math.floor(diag / s) + 1;
                const depth = ntiles * ntiles;

                const tilePoolElevationOptions = new SPACEXR.TilePoolTextureOptions({
                    metrics: demClient.metrics,
                    count: depth,
                    format: BABYLON.Constants.TEXTUREFORMAT_R,
                    textureType: BABYLON.Constants.TEXTURETYPE_FLOAT,
                    samplingMode: BABYLON.Constants.TEXTURE_NEAREST_NEAREST,
                    internalFormat: engine._gl.R16F, // force internal format to save half space
                });

                const elevationSampler = new SPACEXR.TilePoolTexture("altitudes", tilePoolElevationOptions, scene);
                mat.setTexture("altitudes", elevationSampler);

                const tilePoolNormalOptions = new SPACEXR.TilePoolTextureOptions({
                    metrics: demClient.metrics,
                    count: depth,
                    format: BABYLON.Constants.TEXTUREFORMAT_RGB,
                    textureType: BABYLON.Constants.TEXTURETYPE_UNSIGNED_BYTE,
                    samplingMode: BABYLON.Constants.TEXTURE_BILINEAR_SAMPLINGMODE,
                    internalFormat: engine._gl.RGB8, // force internal format
                });

                const normalSampler = new SPACEXR.TilePoolTexture("normals", tilePoolNormalOptions, scene);
                mat.setTexture("normals", normalSampler);

                const tilePoolLayerOptions = new SPACEXR.TilePoolTextureOptions({
                    metrics: layerClient.metrics,
                    count: depth,
                    format: BABYLON.Constants.TEXTUREFORMAT_RGB,
                    textureType: BABYLON.Constants.TEXTURETYPE_UNSIGNED_BYTE,
                    samplingMode: BABYLON.Constants.TEXTURE_BILINEAR_SAMPLINGMODE,
                    internalFormat: engine._gl.RGB8, // force internal format
                });

                const layerSampler = new SPACEXR.TilePoolTexture("layer", tilePoolLayerOptions, scene);
                mat.setTexture("layer", layerSampler);

                map.template.material = mat;
                let min = 10000;

                map.view.updateObservable.add((updateEvent) => {
                    let scale = demClient.metrics.mapScale(map.view.center.lat, map.view.levelOfDetail, display.pixelPerUnit.x);
                    mat.setFloat("mapscale", scale);
                });

                var loadLayer = function (tile, client, map) {
                    client
                        .fetchAsync(tile.address)
                        .then((result) => {
                            if (result.content) {
                                if (map.hasTile(tile.key)) {
                                    const layerArea = layerSampler.reserveArea();
                                    if (layerArea) {
                                        layerArea.update(result.content);
                                        tile.layerArea = layerArea;
                                        const m = tile.surface;
                                        if (m) {
                                            m.instancedBuffers.layerIds.x = layerArea.id;
                                        }
                                    }
                                    return;
                                }
                                // the content is not defined.
                            }
                        })
                        .catch((reason) => {
                            // the lookup operation has failed - TODO describe a strategy
                            console.log(reason);
                        });
                };

                map.addedObservable.add((t) => {
                    const m = t.surface;
                    if (m) {
                        // load layer
                        m.instancedBuffers.layerIds = new BABYLON.Vector4(0, -1, -1, -1);
                        loadLayer(t, layerClient, map);

                        const c = t.content[0];
                        // add instance attributes
                        m.instancedBuffers.demInfos = new BABYLON.Vector4(c.min.z, c.max.z, c.delta, c.mean);
                        const elevationArea = elevationSampler.reserveArea();
                        const normalArea = normalSampler.reserveArea();

                        if (elevationArea && normalArea) {
                            if (c.min.z < min) {
                                // TODO : Get Minimum when remove tiles
                                min = c.min.z;
                                mat.setFloat("minAlt", min);
                            }
                            elevationArea.update(c.elevations);
                            normalArea.update(c.normals);
                            t.elevationArea = elevationArea;
                            t.normalArea = normalArea;

                            // register neighbor ids
                            const neigbors = SPACEXR.TileMetrics.ToNeigborsXY(t.address);

                            let ids = [5, 7, 8];
                            m.instancedBuffers.demIds = new BABYLON.Vector4(elevationArea.id, -1, -1, -1);
                            for (let i = 0; i != ids.length; i++) {
                                const a = neigbors[ids[i]];
                                const keyOfInterest = SPACEXR.TileMetrics.TileXYToQuadKey(a);
                                const tileOfInterest = map.getTile(keyOfInterest);
                                if (tileOfInterest?.elevationArea) {
                                    switch (i) {
                                        case 0: {
                                            m.instancedBuffers.demIds.y = tileOfInterest.elevationArea.id;
                                            break;
                                        }
                                        case 1: {
                                            m.instancedBuffers.demIds.z = tileOfInterest.elevationArea.id;
                                            break;
                                        }
                                        case 2: {
                                            m.instancedBuffers.demIds.w = tileOfInterest.elevationArea.id;
                                            break;
                                        }
                                    }
                                }
                            }

                            // 2 - register the tile to the interested neighbors which are 3, 1, 0
                            ids = [3, 1, 0];
                            for (let i = 0; i != ids.length; i++) {
                                const a = neigbors[ids[i]];
                                const keyOfInterest = SPACEXR.TileMetrics.TileXYToQuadKey(a);
                                const tileOfInterest = map.getTile(keyOfInterest);
                                if (tileOfInterest?.elevationArea) {
                                    switch (i) {
                                        case 0: {
                                            tileOfInterest.surface.instancedBuffers.demIds.y = elevationArea.id;
                                            break;
                                        }
                                        case 1: {
                                            tileOfInterest.surface.instancedBuffers.demIds.z = elevationArea.id;
                                            break;
                                        }
                                        case 2: {
                                            tileOfInterest.surface.instancedBuffers.demIds.w = elevationArea.id;
                                            break;
                                        }
                                    }
                                }
                            }
                        } else {
                            console.log(`Warning ! unable to allocate area  ${elevationSampler.usedAreaCount}/${elevationSampler.areaCount}`);
                        }
                    }
                });

                const insertFirst = true;
                map.removedObservable.add(
                    (t) => {
                        if (t.elevationArea) {
                            t.elevationArea.release();
                            t.elevationArea = undefined;
                            //console.log(`area count after release ${elevationSampler.usedAreaCount}/${elevationSampler.areaCount}`);
                        }
                        if (t.normalArea) {
                            t.normalArea.release();
                            t.normalArea = undefined;
                        }
                        if (t.layerArea) {
                            t.layerArea.release();
                            t.layerArea = undefined;
                        }
                    },
                    -1,
                    insertFirst
                );

                map.view.validate();

                // interaction avec la carte
                // Warning !! this MUST be include into a Manager somewher
                let startingPixel;

                var getDisplayPosition = function () {
                    var pickinfo = scene.pick(scene.pointerX, scene.pointerY, function (mesh) {
                        return mesh == display;
                    });
                    if (pickinfo.hit) {
                        return pickinfo.pickedPoint;
                    }

                    return null;
                };

                var pointerDown = function (mesh) {
                    const current = getDisplayPosition();
                    if (current) {
                        startingPixel = map.display.getPixelToRef(current);
                        // we need to disconnect camera from canvas
                        setTimeout(function () {
                            camera.detachControl(canvas);
                        }, 0);
                    }
                };

                var pointerUp = function () {
                    if (startingPixel) {
                        camera.attachControl(canvas, true);
                        startingPixel = null;
                        return;
                    }
                };

                var pointerMove = function (pointerInfo) {
                    if (startingPixel) {
                        const current = getDisplayPosition();
                        if (current) {
                            const pixelXY = map.display.getPixelToRef(current);
                            const diff = pixelXY.subtract(startingPixel);
                            if (diff.x == 0 && diff.y == 0) {
                                return;
                            }
                            switch (pointerInfo.event.buttons) {
                                case 1: {
                                    map.translate(diff.x, diff.y);
                                    break;
                                }
                                case 2: {
                                    map.rotate(diff.x);
                                    updateCompassRotation(map.azimuth);
                                    break;
                                }
                            }
                            startingPixel = pixelXY;
                        }
                    }
                };

                scene.onPointerObservable.add((pointerInfo) => {
                    switch (pointerInfo.type) {
                        case BABYLON.PointerEventTypes.POINTERDOWN:
                            if (pointerInfo.pickInfo.hit) {
                                pointerDown(pointerInfo.pickInfo.pickedMesh);
                            }
                            break;
                        case BABYLON.PointerEventTypes.POINTERUP:
                            pointerUp();
                            break;
                        case BABYLON.PointerEventTypes.POINTERMOVE:
                            pointerMove(pointerInfo);
                            break;
                    }
                });

                updateCompassRotation = function (rotation) {
                    var compass = document.getElementById("compass");
                    compass.style.transform = "rotate(" + rotation + "deg)";
                };

                // Function to handle the compass click event
                handleCompassClick = function (event) {
                    map.setAzimuth(0);
                    updateCompassRotation(0);
                };

                // Add a click event listener to the compass
                var compass = document.getElementById("compass");
                compass.addEventListener("click", handleCompassClick);

                // Add a click event listener to the zoom in button
                var zoomInBt = document.getElementById("zoomin");
                zoomInBt.addEventListener("click", () => map.zoomIn(0.1));

                // Add a click event listener to the zoom out button
                var zoomOutBt = document.getElementById("zoomout");
                zoomOutBt.addEventListener("click", () => map.zoomOut(0.1));

                // const mainAxes = new BABYLON.AxesViewer(scene, 20);
                // const screenAxes = new BABYLON.AxesViewer(scene, 20);

                // const ctx = display.context;
                // screenAxes.xAxis.parent = ctx;
                // screenAxes.yAxis.parent = ctx;
                // screenAxes.zAxis.parent = ctx;
                // scene.debugLayer.show();
                return scene;
            }

            window.onload = () => {
                const canvas = document.getElementById("mapcanvas3d"); // Get the canvas element
                const engine = new BABYLON.Engine(canvas, true); // Generate the BABYLON 3D engine
                const scene = createScene(canvas, engine); //Call the createScene function
                // scene.debugLayer.show();
                // Register a render loop to repeatedly render the scene
                engine.runRenderLoop(function () {
                    scene.render();
                });

                // Watch for browser/canvas resize events
                window.addEventListener("resize", function () {
                    engine.resize();
                });
            };
        </script>
    </body>
</html>
