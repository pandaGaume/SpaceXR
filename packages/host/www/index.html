<!DOCTYPE html>
<html>
    <head>
        <title>Exemple de dessin de tuiles sur canvas</title>
        <script src="../../dev/core/bundles/spacexr.1.0.0.js"></script>
        <script src="./scripts/inputs.js"></script>
        <style>
            #tileCanvas {
                width: 100%;
                height: 100%;
                touch-action: none;
            }
        </style>
    </head>
    <body>
        <canvas id="tileCanvas"></canvas>
        <script>
            window.onload = () => {
                // Récupérer le canvas
                const canvas = document.getElementById("tileCanvas");
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;

                // initialiser la localisation et le niveau de zoom
                let center = new SPACEXR.Geo2(27.98817689833976, 86.92491071824738); // everest
                const lod = 5;

                // definir la source de donnée.
                const terrariumImgClient = SPACEXR.MapZen.DemImagesClient();
                const mapzenMetrics = new SPACEXR.EPSG3857(SPACEXR.MapZen.MetricsOptions);
                const cachePolicy = new SPACEXR.CachePolicyBuilder().withSlidingExpirationFromSeconds(10).build();
                const options = new SPACEXR.TileDirectoryOptionsBuilder().withMetrics(mapzenMetrics).withCacheOptions(cachePolicy).build();
                const directory = new SPACEXR.TileDirectory("terrarium", terrariumImgClient, options);

                // construire la carte.
                const map = new SPACEXR.CanvasTileMap(canvas, directory, center.lat, center.lon, lod);

                function onResize() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    map.invalidateSize();
                }

                function onDrag(m, x, y) {
                    map.translate(-x, -y);
                }

                function onWheel(m, dz) {
                    if (dz < 0) {
                        // zoom in
                        map.zoomIn(dz);
                    } else {
                        // zoom out
                        map.zoomOut(dz);
                    }
                }

                const translateManager = new MouseDragInputs(canvas, { ondrag: onDrag });
                const zoomManager = new MouseWheelInputs(canvas, { onwheel: onWheel, inc: 0.1 });

                // Watch for browser/canvas resize events
                window.addEventListener("resize", onResize);
            };
        </script>
    </body>
</html>
