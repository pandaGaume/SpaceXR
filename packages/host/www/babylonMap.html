<!DOCTYPE html>
<html>
    <head>
        <title>Exemple de dessin de tuiles sur canvas</title>
        <script src="./libs/babylon.js"></script>
        <script src="./libs/babylonjs.loaders.js"></script>
        <script src="./libs/babylon.glTF2FileLoader.js"></script>
        <script src="./libs/babylon.inspector.bundle.js"></script>

        <script src="../../dev/babylon/bundles/stellar_landscape_xr.1.0.0.js"></script>
        <script src="./scripts/inputs.js"></script>
        <style>
            html,
            body {
                height: 100%;
                margin: 0;
            }
            #mapcanvas3d {
                width: 100%;
                height: 100%;
                display: block;
                touch-action: none;
            }
        </style>
    </head>
    <body>
        <div id="mapcontainer">
            <canvas id="mapcanvas3d"></canvas>
        </div>
        <script>
            function createScene(canvas, engine) {
                // This creates a basic Babylon Scene object (non-mesh)
                const scene = new BABYLON.Scene(engine);
                // Parameters: name, alpha, beta, radius, target position, scene
                const camera = new BABYLON.ArcRotateCamera("Camera", Math.PI / 4, Math.PI / 4, 100, new BABYLON.Vector3(0, 1, 0), scene);
                camera.wheelPrecision = 100;
                camera.minZ = 0;
                // This attaches the camera to the canvas
                camera.attachControl(canvas, true);
                // This creates a light, aiming 0,1,0 - to the sky (non-mesh)
                const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
                // Default intensity is 1. Let's dim the light a small amount
                light.intensity = 0.7;

                // create a basic table (in centimeter)
                const h = 100;
                const w = 200;
                const t = 100;
                const table = BABYLON.MeshBuilder.CreatePlane("plane", { height: h, width: w, sideOrientation: BABYLON.Mesh.DOUBLESIDE });
                table.position.y = 0.9;
                table.rotation.x = -Math.PI / 2;
                var tableMaterial = new BABYLON.StandardMaterial("table", scene);
                tableMaterial.diffuseColor = new BABYLON.Color3(0, 0, 0);
                tableMaterial.alpha = 0.4;
                table.material = tableMaterial;

                // create an hologram display reference with a 96 dpi
                const display = SPACEXR.SurfaceMapDisplay.FromResolution(
                    "display",
                    { height: h, width: w, thickness: t },
                    { x: 256, y: 144, z: 144 }, // in 'pixel', ratio of 16/9
                    scene
                );
                display.parent = table;

                // definir la source de donnée.
                const terrariumImgClient = SPACEXR.MapZen.DemImagesClient();
                const metricOptions = new SPACEXR.TileMetricsOptionsBuilder()
                    .withMaxLOD(SPACEXR.MapZen.MaxLevelOfDetail)
                    .withCellCoordinateReference(SPACEXR.CellCoordinateReference.center)
                    .build();
                const mapzenMetrics = new SPACEXR.EPSG3857(metricOptions);

                const options = {
                    metrics: mapzenMetrics,
                    center: new SPACEXR.Geo2(27.98817689833976, 86.92491071824738), // everest,
                    levelOfDetail: 11,
                    gridOptions: new SPACEXR.TerrainGridOptionsBuilder().build(),
                    insets: new SPACEXR.Cartesian3(0, 0, 10),
                };

                // construire la carte.
                const map = new SPACEXR.SurfaceTileMap("map", display, terrariumImgClient, options, scene);
                const terrainMaterial = new BABYLON.StandardMaterial("terrain_material", scene);
                terrainMaterial.wireframe = true;
                terrainMaterial.clipPlane = new BABYLON.Plane(1, 0, 0, -w / 2);
                terrainMaterial.clipPlane2 = new BABYLON.Plane(-1, 0, 0, -w / 2);
                terrainMaterial.clipPlane3 = new BABYLON.Plane(0, 0, 1, -h / 2);
                terrainMaterial.clipPlane4 = new BABYLON.Plane(0, 0, -1, -h / 2);
                map.template.material = terrainMaterial;
                map.view.validate();

                // interaction avec la carte
                var greenMat = new BABYLON.StandardMaterial("ground", scene);
                greenMat.diffuseColor = new BABYLON.Color3(0.4, 0.4, 0.4);
                greenMat.specularColor = new BABYLON.Color3(0.4, 0.4, 0.4);
                greenMat.emissiveColor = BABYLON.Color3.Green();

                var greenBox = BABYLON.MeshBuilder.CreateBox("green", { size: 0.1 }, scene);
                greenBox.material = greenMat;

                let startingPoint;

                var getDisplayPosition = function () {
                    var pickinfo = scene.pick(scene.pointerX, scene.pointerY, function (mesh) {
                        return mesh == table;
                    });
                    if (pickinfo.hit) {
                        return pickinfo.pickedPoint;
                    }

                    return null;
                };

                var pointerDown = function (mesh) {
                    startingPoint = getDisplayPosition();
                    if (startingPoint) {
                        // we need to disconnect camera from canvas
                        setTimeout(function () {
                            camera.detachControl(canvas);
                        }, 0);
                    }
                };

                var pointerUp = function () {
                    if (startingPoint) {
                        camera.attachControl(canvas, true);
                        startingPoint = null;
                        return;
                    }
                };

                var pointerMove = function (pointerInfo) {
                    if (startingPoint) {
                        const current = getDisplayPosition();
                        if (current) {
                            var diff = current.subtract(startingPoint);
                            setTimeout(() => {
                                const ppu = display.getPixelsPerUnits();
                                map.translate(-diff.x * ppu.x, -diff.z * ppu.y);
                            });
                            greenBox.position.addInPlace(diff);
                            startingPoint = current;
                        }
                    }
                };

                scene.onPointerObservable.add((pointerInfo) => {
                    switch (pointerInfo.type) {
                        case BABYLON.PointerEventTypes.POINTERDOWN:
                            if (pointerInfo.pickInfo.hit && map.hasMesh(pointerInfo.pickInfo.pickedMesh)) {
                                pointerDown(pointerInfo.pickInfo.pickedMesh);
                            }
                            break;
                        case BABYLON.PointerEventTypes.POINTERUP:
                            pointerUp();
                            break;
                        case BABYLON.PointerEventTypes.POINTERMOVE:
                            pointerMove(pointerInfo);
                            break;
                    }
                });

                const axes = new BABYLON.AxesViewer(scene, 1);

                return scene;
            }

            window.onload = () => {
                const canvas = document.getElementById("mapcanvas3d"); // Get the canvas element
                const engine = new BABYLON.Engine(canvas, true); // Generate the BABYLON 3D engine
                const scene = createScene(canvas, engine); //Call the createScene function
                scene.debugLayer.show();
                // Register a render loop to repeatedly render the scene
                engine.runRenderLoop(function () {
                    scene.render();
                });
                // Watch for browser/canvas resize events
                window.addEventListener("resize", function () {
                    engine.resize();
                });
            };
        </script>
    </body>
</html>
