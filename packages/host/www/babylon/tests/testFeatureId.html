<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Test EXT_mesh_features with attributes</title>
        <script src="../../libs/babylon.js"></script>
        <script src="../../libs/babylon.inspector.bundle.js"></script>
        <script src="../../libs/babylon.glTF2FileLoader.min.js"></script>
        <script src="../../libs/stellar_landscape_xr.1.0.0.js"></script>

        <style>
            html,
            body {
                overflow: hidden;
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
            }

            #mapcanvas3d {
                width: 100%;
                height: 100%;
            }
            .babylon-purple-bg {
                background-color: #34344a;
                color: white;
            }
            header {
                border-bottom: 10px solid #34344a;
            }
            h1 {
                font-size: 32px;
            }
            p {
                font-size: 20px;
            }
        </style>
    </head>
    <body>
        <div id="mapcontainer">
            <canvas id="mapcanvas3d"></canvas>
        </div>
        <script>
            window.getUrlParameter = (name) => {
                name = name.replace(/[\[]/, "\\[").replace(/[\]]/, "\\]");
                var regex = new RegExp("[\\?&]" + name + "=([^&#]*)");
                var results = regex.exec(window.location.search);
                return results !== null ? decodeURIComponent(results[1].replace(/\+/g, " ")) : null;
            };

            const unit = 1;
            async function createScene(canvas, engine) {
                const scene = new BABYLON.Scene(engine);
                // Parameters: name, alpha, beta, radius, target position, scene
                const camera = new BABYLON.ArcRotateCamera("Camera", Math.PI / 4, Math.PI / 3, 4 * unit, new BABYLON.Vector3(0, 0, 0), scene);

                // This attaches the camera to the canvas
                camera.attachControl(canvas, true);

                // This creates a light, aiming 0,-1,0 - from the sky (non-mesh)
                const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(1, 1, 1), scene);
                // Default intensity is 1. Let's dim the light a small amount
                light.intensity = 1.0;
                light.diffuse = new BABYLON.Color3(1, 1, 1);

                const root = window.getUrlParameter("root") ?? "gltf";
                const file = window.getUrlParameter("file");
                if (file) {
                    BABYLON.SceneLoader.ImportMesh(null, `../../models/tests/${root}/`, file, scene, function (meshes) {
                        for (const m of meshes) {
                            if (m.structuralMetadata) {
                                console.log("metadata found");
                            }
                            if (m.featureIds) {
                                console.log("feature ids found");
                            }
                            if (m.thinInstanceIds) {
                                console.log("instance ids found");
                            }
                        }

                        // Compute the bounding box of all loaded meshes, but the root.
                        const boundingInfo = BABYLON.Mesh.MinMax(meshes.toSpliced(0, 1));

                        const center = boundingInfo.min.add(boundingInfo.max).scale(0.5);
                        const size = boundingInfo.max.subtract(boundingInfo.min).length() * 0.8;

                        // Position the camera at a good distance ( 0.8 * box diagonal size)
                        camera.position.copyFromFloats(center.x + size, center.y + size, center.z + size);

                        // Ensure camera is looking at the target
                        const target = new BABYLON.Vector3(center.x, center.y, center.z);
                        camera.setTarget(target);

                        // Set camera near and far planes based on bounding size
                        camera.minZ = size;
                        camera.maxZ = size * 2;
                    });
                }
                return scene;
            }

            window.onload = async () => {
                const canvas = document.getElementById("mapcanvas3d"); // Get the canvas element
                const engine = new BABYLON.Engine(canvas, true); // Generate the BABYLON 3D engine
                const scene = await createScene(canvas, engine); //Call the createScene function
                scene.debugLayer.show();

                // Register a render loop to repeatedly render the scene
                engine.runRenderLoop(function () {
                    scene.render();
                });

                // Watch for browser/canvas resize events
                window.addEventListener("resize", function () {
                    engine.resize();
                });
            };
        </script>
    </body>
</html>
